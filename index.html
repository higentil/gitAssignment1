<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <!-- Main Styles -->
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/all.css">
</head>

<body>
 <!-- Main layout wrapper for the entire page -->
    <div class="wrapper">

        <!-- Header: contains logo, navigation menu, and mobile toggle button -->
        <header class="header">
            <a href="/" class="logo">
                <img src="images/logo.svg" alt="Company logo">
            </a>

            <nav class="main-nav" aria-label="Main Navigation">
                <ul>
                    <li><a href="#">Home</a></li>
                    <!-- Courses menu with dropdown submenu -->
                    <li>
                        <a href="#">Courses</a>
                        <ul class="submenu" aria-label="Courses submenu">
                            <li><a href="#">HTML</a></li>
                            <li><a href="#">CSS</a></li>
                            <li><a href="#">JavaScript</a></li>
                        </ul>
                    </li>

                    <li><a href="#">Services</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Contact Us</a></li>
                    <li><a href="#" class="btn">Sign Up</a></li>
                </ul>
            </nav>

             <!-- Mobile navigation toggle button (hamburger icon) -->
            <button class="menu-toggle" aria-label="Toggle navigation">
                <i class="fa fa-bars"></i>
            </button>
        </header>

        <section id="home">
            <!-- Slider container: holds all slider images -->
            <div class="slide-wrapper">
                <div class="slider pic-1"></div>
                <div class="slider pic-2"></div>
                <div class="slider pic-3"></div>
                <div class="slider pic-4"></div>
                <div class="slider pic-5"></div>
            </div>
        </section>

    </div>

    <script src="scripts/main.js" defer></script>
</body>
</html>
